<!DOCTYPE html>
<html lang="hr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!--dodati meta tag bitan za stranicu-->
	<meta name="description" content="Project for learning how to create web sites">
	<!--dodati link za css dokumente -->
	<link rel="stylesheet" href="../styles/style.css">
	<link rel="stylesheet" href="../styles/style_bars.css">
	<title>Filmovi</title> <!--promijeniti odgovarajući tekst na stranici
	ovo je samo predložak-->
</head>
<body>
	<header>
	<h1>Movie Charts</h1>
	</header>

	<nav class="nav-menu" aria-label="Glavna navigacija"> <!-- dodati obilježja za ARIA-->
		<ul>
			<li><a href="../index.html">Home</a></li>
			<li><a href="charts.html">Charts</a></li>
			<li><a href="images.html">Gallery</a></li>
		</ul>
	</nav>
	
	<main>
		<div class="chart">
			<h2>Distribution of Movies and TV Shows</h2>
			<div class="pie-chart" aria-label="Distribucija sadržaja: 40% Movie, 60% TV Show"></div>
			<ul class="pie-legend">
				<li><span class="legend-color movie"></span> Movie 40%</li>
				<li><span class="legend-color tvshow"></span> TV Show 60%</li>
			</ul>
		</div>
		
		<div class="chart">
			<h2>Movie Rating Distribution</h2>
			<div class="bar-chart">
				<div class="bar-container">
					<div class="bar tv-ma" style="--height: 70%;"></div>
					<span>TV-MA (14)</span>
				</div>
				<div class="bar-container">
					<div class="bar tv-14" style="--height: 20%;"></div>
					<span>PG-13 (4)</span>
				</div>
				<div class="bar-container">
					<div class="bar pg-13" style="--height: 10%;"></div>
					<span>TV-14 (2)</span>
				</div>
			</div>
		</div>
	</main>

	<footer>
	<p>&copy; 2026. Web Programming. All rights reserved.</p>
	</footer>
</body>
</html>
